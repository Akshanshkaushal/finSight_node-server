version: '3.8'

services:
  # PostgreSQL Databases
  postgres-auth:
    image: postgres:15-alpine
    container_name: finsight-postgres-auth
    environment:
      POSTGRES_DB: finsight_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  postgres-users:
    image: postgres:15-alpine
    container_name: finsight-postgres-users
    environment:
      POSTGRES_DB: finsight_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  postgres-advisory:
    image: postgres:15-alpine
    container_name: finsight-postgres-advisory
    environment:
      POSTGRES_DB: finsight_advisory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-advisory-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  postgres-notifications:
    image: postgres:15-alpine
    container_name: finsight-postgres-notifications
    environment:
      POSTGRES_DB: finsight_notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  postgres-subscriptions:
    image: postgres:15-alpine
    container_name: finsight-postgres-subscriptions
    environment:
      POSTGRES_DB: finsight_subscriptions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-subscriptions-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  postgres-payments:
    image: postgres:15-alpine
    container_name: finsight-postgres-payments
    environment:
      POSTGRES_DB: finsight_payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: finsight-mongodb
    environment:
      MONGO_INITDB_DATABASE: finsight_news
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finsight-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finsight-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Use container hostname so other services resolve correctly inside the bridge network
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-network

  # Microservices
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: finsight-api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: finsight-secret-key-change-in-production
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      NEWS_SERVICE_URL: http://news-service:3003
      ADVISORY_SERVICE_URL: http://advisory-service:3005
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:3007
      PAYMENT_SERVICE_URL: http://payment-service:3008
    depends_on:
      - auth-service
      - user-service
      - news-service
      - advisory-service
      - subscription-service
      - payment-service
    networks:
      - finsight-network

  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    container_name: finsight-auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: finsight_auth
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: finsight-secret-key-change-in-production
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - finsight-network

  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    container_name: finsight-user-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: finsight_users
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finsight-network

  news-service:
    build:
      context: ..
      dockerfile: news-service/Dockerfile
    container_name: finsight-news-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/finsight_news
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - finsight-network

  finance-engine:
    build:
      context: ..
      dockerfile: finance-engine/Dockerfile
    container_name: finsight-finance-engine
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      USER_SERVICE_URL: http://user-service:3002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      user-service:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - finsight-network

  advisory-service:
    build:
      context: ..
      dockerfile: advisory-service/Dockerfile
    container_name: finsight-advisory-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DB_HOST: postgres-advisory
      DB_PORT: 5432
      DB_NAME: finsight_advisory
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:3007
    depends_on:
      postgres-advisory:
        condition: service_healthy
      kafka:
        condition: service_healthy
      subscription-service:
        condition: service_started
    networks:
      - finsight-network

  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    container_name: finsight-notification-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      DB_HOST: postgres-notifications
      DB_PORT: 5432
      DB_NAME: finsight_notifications
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      EMAIL_SERVICE_ENABLED: "true"
    depends_on:
      postgres-notifications:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - finsight-network

  subscription-service:
    build:
      context: ..
      dockerfile: subscription-service/Dockerfile
    container_name: finsight-subscription-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      DB_HOST: postgres-subscriptions
      DB_PORT: 5432
      DB_NAME: finsight_subscriptions
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-subscriptions:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - finsight-network

  payment-service:
    build:
      context: ..
      dockerfile: payment-service/Dockerfile
    container_name: finsight-payment-service
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      DB_HOST: postgres-payments
      DB_PORT: 5432
      DB_NAME: finsight_payments
      DB_USER: postgres
      DB_PASSWORD: postgres
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:3007
      MOCK_GATEWAY_ENABLED: "true"
    depends_on:
      postgres-payments:
        condition: service_healthy
      subscription-service:
        condition: service_started
    networks:
      - finsight-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: finsight-frontend
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE=http://api-gateway:3000
    depends_on:
      - api-gateway
    networks:
      - finsight-network

  ml-service:
    build:
      context: ..
      dockerfile: ml-service/Dockerfile
    container_name: finsight-ml-service
    ports:
      - "3009:3009"
    environment:
      PORT: 3009
    networks:
      - finsight-network

networks:
  finsight-network:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-users-data:
  postgres-advisory-data:
  postgres-notifications-data:
  postgres-subscriptions-data:
  postgres-payments-data:
  mongodb-data:
  redis-data:

